<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Pro - Công cụ tính hiệu suất hàng đợi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ec4b6;
            --warning: #ff9f1c;
            --danger: #e71d36;
            --dark: #2d3748;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background: var(--bg); 
            color: var(--dark);
            line-height: 1.6;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; margin-top: -10px; font-weight: 800; }

        /* Tabs */
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            background: #e2e8f0; 
            padding: 6px; 
            border-radius: 14px; 
        }
        .tab { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
            color: #64748b; 
        }
        .tab.active { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3); 
        }

        /* Input Section */
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-field { display: flex; flex-direction: column; }
        label { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #222831; }
        input { 
            padding: 12px; 
            border: 2px solid #edf2f7; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: all 0.3s; 
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1); }

        .section { display: none; margin-top: 10px; }
        .section.active { display: block; animation: fadeIn 0.4s; }

        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: transform 0.2s, opacity 0.3s; 
        }
        button:hover { opacity: 0.95; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* Dashboard Result */
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .kpi-card { 
            background: #fff; 
            padding: 10px; 
            border-radius: 16px; 
            border: 1px solid #f0f0f0; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .kpi-label { font-size: 13px; color: #718096; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-value { font-size: 26px; font-weight: 800; color: var(--dark); }
        .kpi-unit { font-size: 12px; color: #a0aec0; margin-left: 4px; font-weight: normal; }

        .status-box { padding: 10px; border-radius: 16px; margin-top: 20px; display: flex; align-items: center; gap: 20px; }
        .bg-good { background: #e6fffa; border: 1px solid #b2f5ea; color: #234e52; }
        .bg-warn { background: #fffaf0; border: 1px solid #feebc8; color: #744210; }
        .bg-bad { background: #fff5f5; border: 1px solid #feb2b2; color: #822727; }

        .status-good { color: var(--success); }
        .status-warn { color: var(--warning); }
        .status-bad { color: var(--danger); }

        /* Chart Layout */
        .chart-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Hiệu Suất Hàng Đợi</h2>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('mm1')">M/M/1</div>
        <div class="tab" onclick="switchTab('mms')">M/M/s</div>
        <div class="tab" onclick="switchTab('mg1')">M/G/1</div>
    </div>

    <div class="input-group">
        <div class="input-field">
            <label><b>λ</b><i>  (Tốc độ khách đến/ đơn vị thời gian)</i></label>
            <input type="number" id="lambda" placeholder="VD: 10">
        </div>
        <div class="input-field">
            <label><b>μ</b><i>  (Tốc độ phục vụ/ đơn vị thời gian)</i></label>
            <input type="number" id="mu" placeholder="VD: 12">
        </div>
    </div>

    <div id="mms_sec" class="section">
        <div class="input-field">
            <label><b>s</b><i>  (Số kênh phục vụ)</i></label>
            <input type="number" id="servers" value="1">
        </div>
    </div>

    <div id="mg1_sec" class="section">
        <div class="input-field">
            <label><b>σ²</b><i>  (Phương sai)</i></label>
            <input type="number" id="variance" placeholder="VD: 0.5">
        </div>
    </div>

    <button onclick="calculate()">Phân Tích Hệ Thống</button>

    <div id="output"></div>

    <div class="chart-container" id="chartWrapper" style="display: none;">
        <div class="kpi-card">
            <canvas id="chart"></canvas>
        </div>
        <div class="kpi-card">
            <canvas id="gauge"></canvas>
        </div>
    </div>
</div>

<script>
    let currentModel = 'mm1';
    let chart, gauge;

    function switchTab(m) {
        currentModel = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        
        event.target.classList.add('active');
        if(m === 'mms') document.getElementById('mms_sec').classList.add('active');
        if(m === 'mg1') document.getElementById('mg1_sec').classList.add('active');
    }

    function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        if (!obj) return;
        let startTime = null;
        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            let progress = Math.min((timestamp - startTime) / duration, 1);
            obj.innerHTML = (start + progress * (end - start)).toFixed(2);
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function calculate() {
        let lambda = parseFloat(document.getElementById('lambda').value);
        let mu = parseFloat(document.getElementById('mu').value);
        let s = parseInt(document.getElementById('servers').value || 1);
        let variance = parseFloat(document.getElementById('variance').value || 0);

        if (!lambda || !mu) { alert("Vui lòng nhập đầy đủ λ và μ"); return; }

        let rho = lambda / (s * mu);
        let L, Lq, W, Wq;

        if (rho >= 1) {
            document.getElementById('output').innerHTML = `
                <div class="status-box bg-bad">
                    <div style="font-size: 30px">❌</div>
                    <div><b>Hệ thống không ổn định!</b><br>Tốc độ khách đến vượt quá khả năng phục vụ (ρ ≥ 1). Hàng đợi sẽ kéo dài vô tận.</div>
                </div>`;
            document.getElementById('chartWrapper').style.display = 'none';
            return;
        }

        if (currentModel === 'mm1') {
            L = lambda / (mu - lambda);
            Lq = (lambda * lambda) / (mu * (mu - lambda));
            W = 1 / (mu - lambda);
            Wq = lambda / (mu * (mu - lambda));
        } else if (currentModel === 'mms') {
            let sum = 0;
            for (let n = 0; n < s; n++) sum += Math.pow(lambda / mu, n) / factorial(n);
            let last = Math.pow(lambda / mu, s) / (factorial(s) * (1 - rho));
            let P0 = 1 / (sum + last);
            Lq = (P0 * Math.pow(lambda / mu, s) * rho) / (factorial(s) * Math.pow(1 - rho, 2));
            L = Lq + (lambda / mu);
            W = L / lambda;
            Wq = Lq / lambda;
        } else if (currentModel === 'mg1') {
            let r = lambda / mu;
            Lq = (Math.pow(lambda, 2) * variance + Math.pow(r, 2)) / (2 * (1 - r));
            L = Lq + r;
            W = L / lambda;
            Wq = Lq / lambda;
        }

        renderResult(rho, L, Lq, W, Wq);
        renderCharts(rho, L, Lq, W, Wq);
    }

    function renderResult(rho, L, Lq, W, Wq) {
        let statusClass = rho < 0.7 ? 'status-good' : rho < 0.9 ? 'status-warn' : 'status-bad';
        let bgClass = rho < 0.7 ? 'bg-good' : rho < 0.9 ? 'bg-warn' : 'bg-bad';
        let statusText = rho < 0.7 ? 'Vận hành lý tưởng' : rho < 0.9 ? 'Cần chú ý' : 'Quá tải';

        document.getElementById('output').innerHTML = `
            <div class="result-grid">
                <div class="kpi-card">
                    <span class="kpi-label">Hệ số sử dụng (ρ)</span>
                    <span class="kpi-value ${statusClass}" id="rhoVal">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Khách trong hệ thống (L)</span>
                    <span class="kpi-value" id="LVal">0</span><span class="kpi-unit">khách</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Khách đang đợi (Lq)</span>
                    <span class="kpi-value" id="LqVal">0</span><span class="kpi-unit">khách</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Thời gian hệ thống (W)</span>
                    <span class="kpi-value" id="WVal">0</span><span class="kpi-unit">đvtg</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Thời gian chờ (Wq)</span>
                    <span class="kpi-value" id="WqVal">0</span><span class="kpi-unit">đvtg</span>
                </div>
            </div>

            <div class="status-box ${bgClass}">
                <div style="font-size: 30px">${rho < 0.7 ? '✅' : rho < 0.9 ? '⚠️' : '🚨'}</div>
                <div>
                    <b style="font-size: 18px">${statusText}</b><br>
                    <span style="font-size: 14px">
                        ${rho < 0.7 ? 'Hệ thống hoạt động mượt mà. Thời gian chờ tối thiểu.' : 
                          rho < 0.9 ? 'Hàng đợi bắt đầu hình thành. Nên xem xét tăng thêm hiệu suất phục vụ.' : 
                          'Hệ thống đang chịu áp lực lớn. Khách hàng sẽ phải chờ rất lâu!'}
                    </span>
                </div>
            </div>
        `;

        animateValue('rhoVal', 0, rho, 600);
        animateValue('LVal', 0, L, 600);
        animateValue('LqVal', 0, Lq, 600);
        animateValue('WVal', 0, W, 600);
        animateValue('WqVal', 0, Wq, 600);
    }

    function renderCharts(rho, L, Lq, W, Wq) {
        document.getElementById('chartWrapper').style.display = 'grid';

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: ['L (Hệ thống)', 'Lq (Đang chờ)', 'W (Tổng thời gian)', 'Wq (Chờ đợi)'],
                datasets: [{
                    label: 'Chỉ số hiệu suất',
                    data: [L, Lq, W, Wq],
                    backgroundColor: ['#4361ee', '#3f37c9', '#4cc9f0', '#4895ef'],
                    borderRadius: 8
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        if (gauge) gauge.destroy();
        gauge = new Chart(document.getElementById('gauge'), {
            type: 'doughnut',
            data: {
                labels: ['Đang dùng', 'Trống'],
                datasets: [{
                    data: [rho, 1 - rho],
                    backgroundColor: [rho > 0.9 ? '#e71d36' : '#2ec4b6', '#edf2f7'],
                    borderWidth: 0
                }]
            },
            options: {
                circumference: 180,
                rotation: 270,
                cutout: '80%',
                plugins: { title: { display: true, text: 'Tải hệ thống (ρ)' } }
            }
        });
    }
</script>

</body>
</html>
